
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مراجعة الإنجليزي - Top Goal 2</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background: linear-gradient(135deg, #a8edea, #fed6e3); 
            min-height: 100vh; 
            color: #333; 
            margin: 0; 
        }
        
        /* تنسيقات الشاشة الافتتاحية */
        #intro-screen {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin: 50px auto;
            max-width: 650px;
            line-height: 1.8;
        }
        
        /* رسم شعار Top Goal 2 مثل الصورة تماماً */
        .topgoal-logo {
            font-size: 3.5em;
            font-weight: 900;
            font-family: 'Arial Black', sans-serif;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            direction: ltr;
        }
        .tg-t { color: #2c3e50; }
        .tg-o1 { color: #2c3e50; }
        .tg-p { color: #2c3e50; }
        .tg-g { color: #27ae60; font-size: 1.2em; }
        .tg-o2 { color: #2980b9; }
        .tg-a { color: #8e44ad; }
        .tg-l { color: #e84393; }
        .tg-2 { 
            display: inline-block; width: 60px; height: 60px; line-height: 60px; 
            border: 4px solid #16a085; border-radius: 50%; color: #2c3e50; font-size: 0.7em; margin-left: 10px;
        }

        .intro-dedication { color: #d35400; font-weight: bold; font-size: 1.4em; margin-bottom: 20px; }
        
        /* تسجيل الدخول */
        .player-registration { background: #f4f6f7; border: 2px dashed #3498db; padding: 20px; border-radius: 15px; margin: 20px 0; }
        #player-name { font-size: 1.2em; padding: 10px; width: 80%; border-radius: 10px; border: 2px solid #bdc3c7; text-align: center; font-weight: bold; margin-bottom: 10px; outline: none; }
        #player-name:focus { border-color: #2980b9; }

        #start-btn { background: #27ae60; color: white; padding: 15px 40px; font-size: 1.5em; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 20px; box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4); transition: 0.3s; }
        #start-btn:hover { transform: scale(1.05); background: #219150; }

        /* تنسيقات شاشة الاختبار */
        #quiz-screen { display: none; }
        .score-board { font-size: 1.8em; font-weight: bold; color: #fff; background: rgba(0,0,0,0.3); padding: 15px 30px; border-radius: 50px; display: inline-block; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .question-box { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin: 0 auto; max-width: 650px; }
        
        /* تنسيق السؤال الإنجليزي ليكون من اليسار لليمين وواضح */
        .english-text { direction: ltr; text-align: left; font-family: 'Arial', sans-serif; font-size: 1.4em; color: #2c3e50; font-weight: bold; margin-bottom: 20px; line-height: 1.5; }
        .blank-space { border-bottom: 3px solid #e74c3c; display: inline-block; width: 80px; }

        button.option-btn { display: block; margin: 12px auto; padding: 15px; width: 90%; border-radius: 15px; border: 2px solid #ecf0f1; background: #fdfdfd; color: #2980b9; font-size: 1.3em; font-weight: bold; font-family: 'Arial', sans-serif; cursor: pointer; transition: 0.3s; direction: ltr; }
        button.option-btn:hover:not(:disabled) { background: #eaf2f8; border-color: #3498db; transform: scale(1.02); }
        button.option-btn:disabled { cursor: not-allowed; opacity: 0.8; }
        
        /* التغذية الراجعة والشرح بالعربي */
        #feedback { font-size: 1.1em; line-height: 1.8; padding: 20px; margin-top: 20px; border-radius: 15px; display: none; text-align: right; direction: rtl; }
        .exp-details { background: rgba(255,255,255,0.6); padding: 10px 15px; border-radius: 10px; margin-top: 10px; border-right: 4px solid; }
        
        /* تنسيق أزرار التنقل */
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; direction: rtl; }
        .nav-btn { font-size: 1.1em; font-weight: bold; padding: 15px; border-radius: 15px; border: none; cursor: pointer; transition: 0.3s; flex: 1; color: white; }
        #prev-btn { background-color: #95a5a6; }
        #next-btn { background-color: #34495e; }

        /* سجل الأبطال لـ 25 مركز */
        #leaderboard-screen { display: none; }
        .leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 1.1em; direction: rtl; }
        .leaderboard-table th, .leaderboard-table td { padding: 12px; border-bottom: 2px solid #eee; text-align: center; }
        .leaderboard-table th { background-color: #2980b9; color: white; }
        .leaderboard-table tr:nth-child(2) td { font-weight: bold; font-size: 1.2em; background-color: #fff9c4; color: #d35400; } 
        .current-player { border: 3px solid #27ae60 !important; background-color: #e9f7ef !important; }

        /* تنسيق العداد */
        .visitor-counter-box { margin-top: 25px; border-top: 1px solid #ddd; padding-top: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; font-weight: bold; color: #7f8c8d; direction: rtl;}
    </style>
</head>
<body>

    <!-- الشاشة الافتتاحية -->
    <div id="intro-screen">
        <!-- الشعار المبرمج -->
        <div class="topgoal-logo">
            <span class="tg-t">T</span><span class="tg-o1">o</span><span class="tg-p">p</span><span class="tg-g">G</span><span class="tg-o2">o</span><span class="tg-a">a</span><span class="tg-l">l</span>
            <div class="tg-2">2</div>
        </div>
        
        <p class="intro-dedication">✨ مراجعة الوحدة الخامسة (Unit 5) الشاملة ✨</p>

        <div class="player-registration" id="reg-box">
            <h3 style="color: #2980b9; margin-top: 0;">أدخل اسمك باللغة الإنجليزية أو العربية للبدء:</h3>
            <input type="text" id="player-name" placeholder="Type your name here..." required>
        </div>

        <button id="start-btn" onclick="startQuiz()">Start Quiz 🚀</button>

        <div class="visitor-counter-box">
            <span>📊 إجمالي الزيارات المسجلة:</span>
            <img src="https://api.visitorbadge.io/api/visitors?path=topgoal2-rev-unit5&label=VISITORS&countColor=%2327ae60" alt="عداد الزوار"/>
        </div>
    </div>

    <!-- شاشة الاختبار -->
    <div id="quiz-screen">
        <div class="score-board">Score: <span id="points" style="color: #f1c40f;">0</span></div>

        <div class="question-box">
            <!-- السؤال سيتم إدراجه هنا بتنسيق LTR -->
            <div id="question-text" class="english-text"></div>
            
            <div id="options-container"></div>
            <div id="feedback"></div>
            
            <div class="nav-buttons">
                <button id="prev-btn" class="nav-btn" onclick="prevQuestion()">⬅ السابق</button>
                <button id="next-btn" class="nav-btn" onclick="nextQuestion()">التالي ➡</button>
            </div>
        </div>
    </div>

    <!-- شاشة سجل الأبطال -->
    <div id="leaderboard-screen">
        <div class="question-box" style="margin-top:20px; max-width:700px;">
            <h1 style="color:#2c3e50; font-size:2.5em;">🎉 Amazing Job! 🎉</h1>
            <h2 style="color:#27ae60; font-size:2em;">Your Score: <span id="final-score-display"></span></h2>
            
            <h2 style="margin-top: 30px; color: #2980b9;">👑 Leaderboard - لوحة الأبطال 👑</h2>
            <div style="overflow-x:auto;">
                <table class="leaderboard-table" id="leaderboard-table">
                    <thead>
                        <tr>
                            <th>المركز</th>
                            <th>البطل</th>
                            <th>النقاط</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body"></tbody>
                </table>
            </div>

            <button onclick="location.reload()" style="background:#3498db; color:white; padding:15px; border-radius:15px; border:none; font-size:1.2em; font-weight:bold; cursor:pointer; width:80%; margin-top:30px;">إعادة التحدي 🔄</button>
        </div>
    </div>

<script>
// الأسئلة مع الشرح العربي المفصل
const questions = [
    {
        "q_num": 1,
        "question": "My brother Mustafa loves 3D <span class='blank-space'></span>. He enjoys movies made by computers.",
        "options": ["animation", "mystery", "sci-fi", "musical"],
        "answer": "animation",
        "exp": "الجملة تقول إن مصطفى يحب الأفلام (المصنوعة بالكمبيوتر - made by computers)، وهذا هو بالضبط تعريف <b>الرسوم المتحركة (animation)</b>. الخيارات الأخرى لا تناسب هذا الوصف."
    },
    {
        "q_num": 2,
        "question": "The movie was a <span class='blank-space'></span>. We didn't know what was happening until the end.",
        "options": ["plot", "mystery", "play", "comedy"],
        "answer": "mystery",
        "exp": "الكلمة المفتاحية هي (لم نكن نعرف ما يحدث حتى النهاية)، وهذا هو أسلوب أفلام <b>الغموض (mystery)</b>."
    },
    {
        "q_num": 3,
        "question": "Space and planets are Omar's favorite topic. That's why he chose a <span class='blank-space'></span> movie.",
        "options": ["sci-fi", "musical", "play", "horror"],
        "answer": "sci-fi",
        "exp": "الكلمات المفتاحية هنا هي (Space) الفضاء، و (planets) الكواكب. هذه المواضيع ترتبط دائماً بأفلام <b>الخيال العلمي (sci-fi)</b>."
    },
    {
        "q_num": 4,
        "question": "Aisha didn't like the <span class='blank-space'></span> we were watching. She said the singing was bad.",
        "options": ["sci-fi", "horror", "musical", "documentary"],
        "answer": "musical",
        "exp": "بما أن عائشة اشتكت من أن (الغناء كان سيئاً - the singing was bad)، فهذا يدل بوضوح على أن الفيلم كان فيلماً <b>موسيقياً (musical)</b>."
    },
    {
        "q_num": 5,
        "question": "The best thing about this story is the <span class='blank-space'></span>. They are all different and interesting.",
        "options": ["characters", "storyboard", "horror", "act"],
        "answer": "characters",
        "exp": "القصص تتكون من (شخصيات). الجملة تقول إنهم مختلفون ومثيرون للاهتمام، لذا الكلمة الصحيحة هي <b>الشخصيات (characters)</b>."
    },
    {
        "q_num": 6,
        "question": "Amina <span class='blank-space'></span> (eat) a sandwich in class yesterday.",
        "options": ["were eating", "was eating", "is eating", "ate"],
        "answer": "was eating",
        "exp": "سؤال قواعد عن (الماضي المستمر). الفاعل (Amina) مفرد، لذلك نستخدم <b>was</b>. ثم نضيف للفعل eat الحروف <b>ing</b> ليصبح <b>was eating</b> لأنه حدث كان مستمراً."
    },
    {
        "q_num": 7,
        "question": "We <span class='blank-space'></span> (laugh) because the horror movie was funny.",
        "options": ["were laughing", "was laughing", "are laughing", "laughed"],
        "answer": "were laughing",
        "exp": "الضمير (We) يعني نحن وهو للجمع، لذلك يأخذ <b>were</b>. ونضيف للفعل laugh الحروف <b>ing</b> لتصبح الإجابة الصحيحة <b>were laughing</b>."
    },
    {
        "q_num": 8,
        "question": "<span class='blank-space'></span> Adel and Ibrahim (make) a documentary last week?",
        "options": ["Was / making", "Were / making", "Are / making", "Did / make"],
        "answer": "Were / making",
        "exp": "سؤال في الماضي المستمر. الفاعل (عادل وإبراهيم) جمع، لذا نبدأ السؤال بـ <b>Were</b>. والفعل make نحذف منه الـ e ونضيف <b>ing</b> ليصبح <b>making</b>."
    },
    {
        "q_num": 9,
        "question": "Match: Why don't <span class='blank-space'></span>?",
        "options": ["you show me your ideas?", "a storyboard to help us?", "about starting the story with a song?", "we draw the characters on this page?"],
        "answer": "we draw the characters on this page?",
        "exp": "قاعدة تقديم الاقتراحات: عبارة (Why don't) تتبعها دائماً كلمة (we) ثم فعل مجرد بدون إضافات. لذلك الخيار <b>Why don't we draw...</b> هو التركيب الصحيح."
    },
    {
        "q_num": 10,
        "question": "Match: How about <span class='blank-space'></span>?",
        "options": ["we draw the characters?", "using a storyboard to help us?", "show me your ideas?", "you show me your ideas?"],
        "answer": "using a storyboard to help us?",
        "exp": "قاعدة مهمة جداً: بعد عبارة (How about) أو (What about) يجب أن يأتي الفعل مضافاً له <b>ing</b>. الخيار الوحيد الذي يبدأ بفعل فيه ing هو <b>using</b>."
    }
];

let currentIdx = 0;
let userAnswers = {}; 
let currentPlayer = "";
let defaultLeaderboard = [
    { name: "Super Student", score: 100 },
    { name: "Top Goal Hero", score: 80 }
];

function startQuiz() {
    let inputName = document.getElementById('player-name').value.trim();
    if(inputName === "") { alert("Please enter your name! رجاءً أدخل اسمك"); return; }
    currentPlayer = inputName;
    document.getElementById('intro-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    loadQ();
}

function updateScore() {
    let score = Object.values(userAnswers).filter(a => a.isCorrect).length * 10;
    document.getElementById('points').innerText = score;
    return score;
}

function showFeedbackUI(o, q, isCorrect) {
    let f = document.getElementById('feedback'); 
    f.style.display = "block";
    f.style.borderRight = isCorrect ? "8px solid #27ae60" : "8px solid #e74c3c";
    f.style.borderLeft = "none";

    if(isCorrect) { 
        f.style.backgroundColor = "#e8f8f5"; 
        f.style.color = "#155724"; 
        f.innerHTML = "✅ <b>إجابة صحيحة الممتاز!</b><div class='exp-details' style='border-color:#27ae60;'>💡 <b>كيف حليناها؟</b><br>" + q.exp + "</div>"; 
    } else { 
        f.style.backgroundColor = "#fdedec"; 
        f.style.color = "#721c24"; 
        f.innerHTML = "❌ <b>إجابة خاطئة.</b><br>🎯 <b>الإجابة الصحيحة هي:</b> <span dir='ltr' style='font-weight:bold; color:#c0392b;'>" + q.answer + "</span><div class='exp-details' style='border-color:#c0392b;'>💡 <b>ليه اخترنا هذه الإجابة؟</b><br>" + q.exp + "</div>"; 
    }
}

function loadQ() {
    let q = questions[currentIdx];
    // إدراج السؤال بالإنجليزي
    document.getElementById('question-text').innerHTML = "Q" + (currentIdx + 1) + ": " + q.question;
    
    let cont = document.getElementById('options-container'); 
    cont.innerHTML = '';
    document.getElementById('feedback').style.display = "none";
    
    document.getElementById('prev-btn').disabled = (currentIdx === 0);
    let nextBtn = document.getElementById('next-btn');
    if (currentIdx === questions.length - 1) {
        nextBtn.innerHTML = "Finish 🏁";
        nextBtn.style.backgroundColor = "#e74c3c";
    } else {
        nextBtn.innerHTML = "Next ➡";
        nextBtn.style.backgroundColor = "#2980b9";
    }

    q.options.forEach(o => {
        let btn = document.createElement('button'); 
        btn.className = "option-btn";
        btn.innerHTML = o;
        
        if (userAnswers[currentIdx]) {
            btn.disabled = true;
            if (o === userAnswers[currentIdx].selected) {
                btn.style.border = userAnswers[currentIdx].isCorrect ? "3px solid #27ae60" : "3px solid #e74c3c";
                btn.style.backgroundColor = userAnswers[currentIdx].isCorrect ? "#e9f7ef" : "#fdedec";
            }
        }

        btn.onclick = () => {
            let allBtns = cont.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);

            let isCorrect = (o === q.answer);
            userAnswers[currentIdx] = { selected: o, isCorrect: isCorrect };
            
            updateScore();
            showFeedbackUI(o, q, isCorrect);
        };
        cont.appendChild(btn);
    });

    if (userAnswers[currentIdx]) {
        showFeedbackUI(userAnswers[currentIdx].selected, q, userAnswers[currentIdx].isCorrect);
    }
}

function prevQuestion() {
    if (currentIdx > 0) { currentIdx--; loadQ(); }
}

function nextQuestion() {
    if(currentIdx < questions.length - 1) {
        currentIdx++; loadQ();
    } else { 
        finishQuiz();
    }
}

function finishQuiz() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('leaderboard-screen').style.display = 'block';
    
    let finalScore = updateScore();
    document.getElementById('final-score-display').innerText = finalScore + " / " + (questions.length * 10);

    let savedLeaderboard = JSON.parse(localStorage.getItem('engLeaderboard'));
    if (!savedLeaderboard) { savedLeaderboard = [...defaultLeaderboard]; }

    let existingPlayer = savedLeaderboard.find(p => p.name === currentPlayer);
    if (existingPlayer) {
        if (finalScore > existingPlayer.score) { existingPlayer.score = finalScore; }
    } else {
        savedLeaderboard.push({ name: currentPlayer, score: finalScore });
    }

    savedLeaderboard.sort((a, b) => b.score - a.score);
    savedLeaderboard = savedLeaderboard.slice(0, 25);
    localStorage.setItem('engLeaderboard', JSON.stringify(savedLeaderboard));

    let tbody = document.getElementById('leaderboard-body');
    tbody.innerHTML = '';
    
    savedLeaderboard.forEach((player, index) => {
        let tr = document.createElement('tr');
        if (player.name === currentPlayer) tr.className = "current-player";
        let rankBadge = (index + 1);
        if (index === 0) rankBadge = "🥇 الأول";
        else if (index === 1) rankBadge = "🥈 الثاني";
        else if (index === 2) rankBadge = "🥉 الثالث";

        tr.innerHTML = `<td>${rankBadge}</td><td style="direction:ltr;">${player.name}</td><td>${player.score}</td>`;
        tbody.appendChild(tr);
    });
}
</script>
</body>
</html>
