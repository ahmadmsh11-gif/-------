<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الإحصاء والاحتمالات الشامل</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        
        body {
            font-family: 'Tajawal', Tahoma, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .header-box {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h1 { margin: 0; font-size: 26px; }
        h2 { margin: 10px 0 0 0; font-size: 18px; font-weight: normal; opacity: 0.9; }
        
        .quiz-container {
            background-color: white;
            max-width: 800px;
            margin: auto;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            position: relative;
        }
        .progress-bar {
            background-color: #e0e0e0;
            height: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background-color: #3498db;
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }
        .question-counter {
            font-size: 16px;
            color: #7f8c8d;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .rule-box {
            background-color: #e3f2fd;
            border: 2px dashed #64b5f6;
            color: #1565c0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
            text-align: right;
        }
        .visual-box {
            margin: 20px 0;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100px;
            border: 1px solid #e0e0e0;
        }
        .question {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #2c3e50;
            text-align: right;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #bdc3c7;
            color: #2c3e50;
            padding: 15px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-align: right;
            padding-right: 20px;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #eaf2f8;
            border-color: #3498db;
        }
        .option-btn:disabled {
            cursor: not-allowed;
        }
        .explanation {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background-color: #fdfefe;
            border-right: 6px solid #f1c40f;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            color: #34495e;
            font-size: 17px;
            text-align: right;
            line-height: 1.8;
        }
        .explanation-title {
            font-weight: bold;
            color: #d35400;
            margin-bottom: 10px;
            font-size: 19px;
        }
        #next-btn {
            display: none;
            margin-top: 25px;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            font-family: inherit;
        }
        #next-btn:hover { background-color: #2980b9; }
        .score-board { font-size: 24px; font-weight: bold; color: #27ae60; display: none; line-height: 2; }
        
        /* تأثيرات الأشكال البرمجية */
        .spinner-wheel {
            width: 120px; height: 120px; border-radius: 50%;
            background: conic-gradient(#e74c3c 0 60deg, #f1c40f 60deg 120deg, #2ecc71 120deg 180deg, #3498db 180deg 240deg, #9b59b6 240deg 300deg, #e67e22 300deg 360deg);
            border: 4px solid #2c3e50; position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .spinner-arrow {
            position: absolute; top: -10px; left: 50px; width: 0; height: 0;
            border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 25px solid #2c3e50;
        }
        .spinner-center {
            position: absolute; top: 50px; left: 50px; width: 20px; height: 20px;
            background: white; border-radius: 50%; border: 3px solid #2c3e50;
        }
        .number-label { position: absolute; font-weight: bold; color: white; text-shadow: 1px 1px 2px black; font-size: 18px; }
        .card-box {
            display: inline-block; padding: 10px 15px; margin: 5px; font-size: 22px; font-weight: bold;
            background: white; border: 2px solid #333; border-radius: 6px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="header-box">
        <h1>إهداء من زميلكم تميم (أبو سعد) إلى زملائه الأذكياء 🎁</h1>
        <h2>تحدي الإحصاء والاحتمالات الشامل - تدريبات للاختبارات المركزية</h2>
    </div>

    <div class="quiz-container">
        <div id="quiz-content">
            <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
            <div id="counter" class="question-counter"></div>
            
            <div id="rule-box" class="rule-box"></div>
            
            <div id="visual-box" class="visual-box"></div>
            
            <div id="question-text" class="question">جارٍ تحميل السؤال...</div>
            <div id="options-container" class="options"></div>
            <div id="explanation-box" class="explanation"></div>
            <button id="next-btn" onclick="nextQuestion()">السؤال التالي ⬅️</button>
        </div>
        <div id="score-content" class="score-board"></div>
    </div>

    <script>
        // دالة مساعدة لإنشاء شكل القرص الدوار
        const spinnerHTML = `
            <div class="spinner-wheel">
                <div class="spinner-arrow"></div>
                <div class="spinner-center"></div>
                <div class="number-label" style="top: 10px; left: 75px;">1</div>
                <div class="number-label" style="top: 45px; left: 95px;">2</div>
                <div class="number-label" style="top: 80px; left: 75px;">3</div>
                <div class="number-label" style="top: 80px; left: 30px;">4</div>
                <div class="number-label" style="top: 45px; left: 10px;">5</div>
                <div class="number-label" style="top: 10px; left: 30px;">6</div>
            </div>
        `;

        const quizData = [
            {
                rule: "المتوسط الحسابي = (مجموع البيانات) ÷ (عددها)",
                visual: `<div style="font-size: 45px;">🧃 🥤 🧃 🥤 🧃</div><div style="width:100%; text-align:center; font-size: 18px; margin-top:10px;">9 ريال | 5 ريال | 5 ريال | 6 ريال | 10 ريال</div>`,
                question: "أوجد المتوسط الحسابي لأثمان العصائر بالريال: 9، 5، 5، 6، 10",
                options: ["5", "6", "7", "10"],
                answer: "7",
                explanation: "1️⃣ نجمع جميع الأرقام مع بعضها: 9 + 5 + 5 + 6 + 10 = 35.\n2️⃣ نقسم المجموع على عدد هذه الأرقام (5): 35 ÷ 5 = 7."
            },
            {
                rule: "الوسيط = العدد الأوسط في مجموعة البيانات (بعد ترتيبها من الأصغر للأكبر أو العكس)",
                visual: `<div style="font-size: 45px;">🌊 🏞️ 🚤</div><div style="width:100%; text-align:center; font-size: 16px; margin-top:10px;">أطوال الأنهار: 6275، 3596، 2850، 6400، 6650</div>`,
                question: "أوجد الوسيط لأطوال أنهار العالم التالية بالكيلومتر:",
                options: ["2850", "3596", "6275", "6400"],
                answer: "6275",
                explanation: "1️⃣ نرتب الأطوال تصاعدياً: 2850 ثم 3596 ثم 6275 ثم 6400 ثم 6650.\n2️⃣ الرقم 6275 يقع في المنتصف تماماً، إذن هو الوسيط."
            },
            {
                rule: "إذا كان عدد البيانات زوجياً: الوسيط = (مجموع العددين الأوسطين) ÷ 2، بعد الترتيب.",
                visual: `<div style="font-size: 45px;">🤾‍♂️ ⛹️‍♂️ 🏃‍♂️</div><div style="width:100%; text-align:center; font-size: 16px; margin-top:10px;">الأطوال: 160، 165، 148، 150، 158، 155، 170، 165</div>`,
                question: "إذا كانت أطوال 8 من لاعبي كرة اليد بالأعلى، فما الوسيط لهذه الأطوال؟",
                options: ["155", "158", "159", "165"],
                answer: "159",
                explanation: "1️⃣ نرتبها من الأصغر للأكبر: 148، 150، 155، 158، 160، 165، 165، 170.\n2️⃣ سنجد (رقمين) في المنتصف هما: 158 و 160.\n3️⃣ نجمع ثم نقسم على 2: (158 + 160) = 318. ثم 318 ÷ 2 = 159."
            },
            {
                rule: "الاحتمال = (عدد النواتج المطلوبة) ÷ (العدد الكلي للنواتج الممكنة)",
                visual: spinnerHTML,
                question: "تأمل القرص الدوار. ما احتمال وقوف المؤشر على عدد أقل من 6؟",
                options: ["1/6", "2/6", "5/6", "6/6"],
                answer: "5/6",
                explanation: "1️⃣ عدد النواتج الكلي في القرص هو 6 نواتج (المقام).\n2️⃣ الأرقام الأقل من 6 هي: 1، 2، 3، 4، 5 (عددها 5 أرقام في البسط).\n3️⃣ الاحتمال هو 5/6."
            },
            {
                rule: "الاحتمال المستحيل: هو الحدث الذي لا توجد أي فرصة لوقوعه أبداً (ويساوي صفر).",
                visual: spinnerHTML,
                question: "في تجربة تدوير نفس المؤشر السابق، صف احتمال وقوف المؤشر على الرقم (9)؟",
                options: ["مؤكد", "مستحيل", "متساوي الإمكانية", "قوي"],
                answer: "مستحيل",
                explanation: "القرص يحتوي فقط على الأرقام من 1 إلى 6. الرقم 9 غير موجود أساساً في القرص! لذلك هو حدث مستحيل."
            },
            {
                rule: "الاحتمال = (عدد النواتج المطلوبة) ÷ (العدد الكلي للنواتج الممكنة) (تذكر تبسيط الكسر)",
                visual: `<div style="font-size: 40px;">💼 <span style="font-size:25px"> 💵×3 (فئة 50) | 💶×6 (فئة 10) | 💷×18 (فئة 5) </span></div>`,
                question: "في حقيبة الأوراق النقدية أعلاه. ما احتمال سحب ورقة من فئة 50 ريالاً؟",
                options: ["1/4", "1/9", "3/4", "3/18"],
                answer: "1/9",
                explanation: "1️⃣ نجمع كل الأوراق لمعرفة العدد الكلي (المقام): 3 + 6 + 18 = 27 ورقة.\n2️⃣ أوراق الـ 50 ريال عددها 3 (البسط).\n3️⃣ الاحتمال = 3/27. وبتبسيط الكسر (القسمة على 3) يصبح الناتج 1/9."
            },
            {
                rule: "لايجاد احتمال حدثين معاً، نضرب (احتمال الحدث الأول) × (احتمال الحدث الثاني).",
                visual: `<div style="font-size: 55px;">🪙 ✖️ 🎲</div>`,
                question: "عند رمي قطعة نقدية (شعار أو كتابة) ومكعب أرقام (1 إلى 6). ما احتمال ظهور الكتابة والرقم 3 معاً؟",
                options: ["1/2", "1/6", "1/8", "1/12"],
                answer: "1/12",
                explanation: "1️⃣ احتمال ظهور الكتابة = 1/2.\n2️⃣ احتمال ظهور الرقم 3 = 1/6.\n3️⃣ نضرب الاحتمالين: 1/2 × 1/6 = 1/12."
            },
            {
                rule: "الاحتمال = (عدد النواتج المطلوبة) ÷ (العدد الكلي للنواتج الممكنة)",
                visual: `
                    <div class="card-box">ر</div> <div class="card-box">ي</div> <div class="card-box">ا</div> 
                    <div class="card-box">ض</div> <div class="card-box">ي</div> <div class="card-box">ا</div> <div class="card-box">ت</div>
                `,
                question: "تأمل البطاقات السبع بالأعلى. إذا سحبت بطاقة، فما احتمال سحب الحرف (ي)؟",
                options: ["1/7", "2/7", "3/7", "7/7"],
                answer: "2/7",
                explanation: "العدد الكلي للبطاقات هو 7 (المقام). الحرف (ي) تكرر مرتين في الكلمة (البسط). الاحتمال هو 2/7."
            },
            {
                rule: "مبدأ العد الأساسي = (عدد الخيارات للصنف الأول) × (عدد الخيارات للصنف الثاني)",
                visual: `<div style="font-size: 45px;">🐈 🐈‍⬛ 😻</div><div style="width:100%; text-align:center; font-size: 16px; margin-top:10px;">العيون: (زرقاء، خضراء، ذهبية، عسلية) | الفراء: (أسود، بني)</div>`,
                question: "بناءً على الخيارات المذكورة للقط الحبشي بالأعلى. ما عدد الخيارات المختلفة لتكوين قط؟",
                options: ["6", "8", "10", "12"],
                answer: "8",
                explanation: "نضرب عدد خيارات لون العيون (4) في عدد خيارات لون الفراء (2). النتيجة: 4 × 2 = 8 خيارات."
            },
            {
                rule: "مبدأ العد الأساسي = (عدد الخيارات للصنف الأول) × (عدد الخيارات للصنف الثاني)",
                visual: `<div style="font-size: 45px;">🥟 🥧 🍹 🧃</div><div style="width:100%; text-align:center; font-size: 16px; margin-top:10px;">فطائر: (سبانخ، جبن، لحم) | عصائر: (موز، رمان، مشكل، برتقال)</div>`,
                question: "كم وجبة من فطيرة واحدة وعصير واحد يمكن تكوينها؟",
                options: ["7", "9", "12", "16"],
                answer: "12",
                explanation: "نضرب عدد أنواع الفطائر (3) في عدد أنواع العصائر (4). النتيجة: 3 × 4 = 12 وجبة مختلفة."
            },
            {
                rule: "لكل قطعة نقدية وجهان. لمعرفة النواتج الممكنة لرميها مرتين نضرب: 2 × 2 = 4 نواتج.",
                visual: `<div style="font-size: 55px;">🪙 ➡️ 🪙</div>`,
                question: "أرادت هدى وعبير أن تجدا احتمال ظهور (الشعار) مرتين عند إلقاء قطعة نقدية (مرتين). هدى قالت 1/2، وعبير قالت 1/4. أيهما تحليلها صحيح؟",
                options: ["هدى صحيحة", "عبير صحيحة"],
                answer: "عبير صحيحة",
                explanation: "رمي القطعة مرتين ينتج عنه 4 نتائج: (شعار، شعار)، (شعار، كتابة)، (كتابة، شعار)، (كتابة، كتابة).\nظهور الشعار مرتين هو نتيجة (واحدة) من أصل (4)، إذن الاحتمال الصحيح هو 1/4."
            },
            {
                rule: "الاحتمال = (عدد النواتج التي تحقق الشرط المطلوب) ÷ (العدد الكلي للنواتج الممكنة)",
                visual: `<div style="font-size: 45px;">🗓️ 💰 📈</div><div style="width:100%; text-align:center; font-size: 16px; margin-top:10px;">الأسبوع 1: 94 | الأسبوع 2: 152 | الأسبوع 3: 115 | الأسبوع 4: 104</div>`,
                question: "بناءً على المبالغ التي حصل عليها فواز. ما احتمال حصوله على مبلغ (أكثر من 100 ريال) الأسبوع القادم؟",
                options: ["1/4", "1/2", "3/4", "4/4"],
                answer: "3/4",
                explanation: "1️⃣ عدد الأسابيع الكلي هو 4 (المقام).\n2️⃣ المبالغ التي أكبر من 100 هي: 152، 115، 104. (عددها 3 في البسط).\n3️⃣ إذن الاحتمال هو 3/4."
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        const ruleBox = document.getElementById("rule-box");
        const visualBox = document.getElementById("visual-box");
        const questionText = document.getElementById("question-text");
        const optionsContainer = document.getElementById("options-container");
        const explanationBox = document.getElementById("explanation-box");
        const nextBtn = document.getElementById("next-btn");
        const progressFill = document.getElementById("progress");
        const counterText = document.getElementById("counter");
        const quizContent = document.getElementById("quiz-content");
        const scoreContent = document.getElementById("score-content");

        function loadQuestion() {
            explanationBox.style.display = "none";
            nextBtn.style.display = "none";
            optionsContainer.innerHTML = "";
            
            let progressPercentage = (currentQuestionIndex / quizData.length) * 100;
            progressFill.style.width = `${progressPercentage}%`;
            counterText.innerText = `السؤال ${currentQuestionIndex + 1} من ${quizData.length}`;
            
            const currentData = quizData[currentQuestionIndex];
            
            ruleBox.innerHTML = `💡 <strong>تذكر القاعدة:</strong> <br> ${currentData.rule}`;
            visualBox.innerHTML = currentData.visual; // إضافة الرسمة/الشكل الخاص بالسؤال
            questionText.innerText = currentData.question;
            
            currentData.options.forEach(option => {
                const button = document.createElement("button");
                button.innerText = option;
                button.className = "option-btn";
                button.onclick = () => checkAnswer(button, option, currentData.answer, currentData.explanation);
                optionsContainer.appendChild(button);
            });
        }

        function checkAnswer(button, selected, correct, explanation) {
            const buttons = document.querySelectorAll(".option-btn");
            buttons.forEach(btn => btn.disabled = true); 

            if (selected === correct) {
                button.style.backgroundColor = "#2ecc71";
                button.style.borderColor = "#27ae60";
                button.style.color = "white";
                button.innerHTML += " ✅ (إجابة صحيحة)";
                score++;
            } else {
                button.style.backgroundColor = "#e74c3c";
                button.style.borderColor = "#c0392b";
                button.style.color = "white";
                button.innerHTML += " ❌ (إجابة خاطئة)";
                
                buttons.forEach(btn => {
                    if (btn.innerText.includes(correct)) {
                        btn.style.backgroundColor = "#2ecc71";
                        btn.style.color = "white";
                        btn.style.borderColor = "#27ae60";
                        btn.innerHTML += " 👈 (هذا هو الحل الصحيح)";
                    }
                });
            }

            explanationBox.innerHTML = `<div class='explanation-title'>💡 الشرح بالتفصيل:</div>${explanation.replace(/\n/g, '<br>')}`;
            explanationBox.style.display = "block";
            nextBtn.style.display = "block";
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showScore();
            }
        }

        function showScore() {
            quizContent.style.display = "none";
            scoreContent.style.display = "block";
            progressFill.style.width = "100%";
            
            let message = "";
            if(score === quizData.length) message = "أنت بطل وعبقري في الإحصاء والاحتمالات! 🏆";
            else if(score >= quizData.length / 2) message = "عمل رائع ومجهود بطل، استمر في التدريب! 👏";
            else message = "لا بأس، مع قراءة الشرح ومراجعة الأخطاء ستكون درجاتك أفضل في المرة القادمة 💪";

            scoreContent.innerHTML = `
                🎉 انتهى الاختبار! <br><br> 
                نتيجتك النهائية هي: <span style="font-size:36px; color:#e67e22;">${score}</span> من ${quizData.length} <br><br>
                ${message}
            `;
        }

        loadQuestion();
    </script>
</body>
</html>
